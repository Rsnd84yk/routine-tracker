<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Routine Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
color:black;
padding:15px;
margin:10px;
border-radius:15px;
}

.dark{
background:#121212;
}

.dark .card{
background:#1e1e1e;
color:white;
border:1px solid white;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

td,th{
border:1px solid gray;
padding:4px;
}

.dark td,.dark th{
border:1px solid white;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.skip{
background:red;
color:white;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Routine Tracker</h1>

<button onclick="toggleDark()">🌙 Mode sombre</button>

<div class="card">

<h3 id="score">Score : 0%</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<input id="habit" placeholder="Nouvelle habitude">
<button onclick="addHabit()">Ajouter</button>
<button onclick="clearChecks()">Tout décocher</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Habitude</th>

<th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
<th>6</th><th>7</th><th>8</th><th>9</th><th>10</th>
<th>11</th><th>12</th><th>13</th><th>14</th><th>15</th>
<th>16</th><th>17</th><th>18</th><th>19</th><th>20</th>
<th>21</th><th>22</th><th>23</th><th>24</th><th>25</th>
<th>26</th><th>27</th><th>28</th><th>29</th><th>30</th>
<th>31</th>

<th>❌</th>

</tr>

</thead>

<tbody id="list"></tbody>

</table>

</div>

</div>

<script>

let list=document.getElementById("list")
let habit=document.getElementById("habit")
let score=document.getElementById("score")

let ctx=document.getElementById("chart").getContext("2d")

let chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Fait","Restant"],
datasets:[{
data:[0,100]
}]
}
})

function update(){

let checks=document.querySelectorAll("input[type=checkbox]")

let total=0
let ok=0

checks.forEach(c=>{

if(!c.classList.contains("skip")){

total++

if(c.checked) ok++

}

})

let percent= total ? Math.round(ok/total*100):0

score.innerText="Score : "+percent+"%"

chart.data.datasets[0].data=[percent,100-percent]

chart.update()

save()

}

function createRow(name,checks=[]){

let tr=document.createElement("tr")

tr.innerHTML="<td>"+name+"</td>"

for(let i=0;i<31;i++){

let td=document.createElement("td")

let c=document.createElement("input")

c.type="checkbox"

c.checked=checks[i]||false

c.onchange=update

c.oncontextmenu=function(e){

e.preventDefault()

td.innerHTML="❌"

}

td.appendChild(c)

tr.appendChild(td)

}

let del=document.createElement("button")

del.innerText="X"

del.onclick=()=>{tr.remove();update();}

let td=document.createElement("td")

td.appendChild(del)

tr.appendChild(td)

list.appendChild(tr)

}

function addHabit(){

if(!habit.value) return

createRow(habit.value)

habit.value=""

update()

}

function clearChecks(){

document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false)

update()

}

function save(){

let data=[]

document.querySelectorAll("#list tr").forEach(tr=>{

let name=tr.children[0].innerText

let checks=[]

tr.querySelectorAll("input").forEach(c=>checks.push(c.checked))

data.push({name,checks})

})

localStorage.setItem("habits",JSON.stringify(data))

}

function load(){

let data=JSON.parse(localStorage.getItem("habits")||"[]")

data.forEach(h=>createRow(h.name,h.checks))

update()

}

function toggleDark(){

document.body.classList.toggle("dark")

localStorage.setItem("dark",document.body.classList.contains("dark"))

}

if(localStorage.getItem("dark")=="true"){

document.body.classList.add("dark")

}

load()

</script>

</body>

</html>
